<!DOCTYPE html>
<html lang="bg-BG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SI BEBE - Начало</title>
    <link rel="icon" type="image/png" href="assets/icons/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans:400,700|Montserrat:700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="site-header"></div>

    <main>
        <!-- Hero Section -->
        <section class="hero">
            <div class="container">
                <h1 data-key="home.hero_title">SI BEBE - всяко начало е изпълнено с обич и открития.</h1>
                <p data-key="home.hero_text">Добре дошли в нашето защитено пространство за най-малките. Тук бебетата опознават света чрез сетивата си, а родителите откриват подкрепа и споделеност.</p>
                <a href="pages/about.html" class="btn" data-page-link="about" data-key="nav.about">За нас</a>
            </div>
        </section>

        <!-- Dynamic Events Section -->
        <section id="events" class="section-with-hero-cloud events-section" hidden>
            <div class="hero-cloud-divider" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 283.5 27.8" preserveAspectRatio="xMidYMax slice">
                    <path class="shape-fill" d="M265.8 3.5c-10.9 0-15.9 6.2-15.9 6.2s-3.6-3.5-9.2-.9c-9.1 4.1-4.4 13.4-4.4 13.4s-1.2.2-1.9.9c-.6.7-.5 1.9-.5 1.9s-1-.5-2.3-.2c-1.3.3-1.6 1.4-1.6 1.4s.4-3.4-1.5-5c-3.9-3.4-8.3-.2-8.3-.2s-.6-.7-.9-.9c-.4-.2-1.2-.2-1.2-.2s-4.4-3.6-11.5-2.6-10.4 7.9-10.4 7.9-.5-3.3-3.9-4.9c-4.8-2.4-7.4 0-7.4 0s2.4-4.1-1.9-6.4-6.2 1.2-6.2 1.2-.9-.5-2.1-.5-2.3 1.1-2.3 1.1.1-.7-1.1-1.1c-1.2-.4-2 0-2 0s3.6-6.8-3.5-8.9c-6-1.8-7.9 2.6-8.4 4-.1-.3-.4-.7-.9-1.1-1-.7-1.3-.5-1.3-.5s1-4-1.7-5.2c-2.7-1.2-4.2 1.1-4.2 1.1s-3.1-1-5.7 1.4-2.1 5.5-2.1 5.5-.9 0-2.1.7-1.4 1.7-1.4 1.7-1.7-1.2-4.3-1.2c-2.6 0-4.5 1.2-4.5 1.2s-.7-1.5-2.8-2.4c-2.1-.9-4 0-4 0s2.6-5.9-4.7-9c-7.3-3.1-12.6 3.3-12.6 3.3s-.9 0-1.9.2c-.9.2-1.5.9-1.5.9S99.4 3 94.9 3.9c-4.5.9-5.7 5.7-5.7 5.7s-2.8-5-12.3-3.9-11.1 6-11.1 6-1.2-1.4-4-.7c-.8.2-1.3.5-1.8.9-.9-2.1-2.7-4.9-6.2-4.4-3.2.4-4 2.2-4 2.2s-.5-.7-1.2-.7h-1.4s-.5-.9-1.7-1.4-2.4 0-2.4 0-2.4-1.2-4.7 0-3.1 4.1-3.1 4.1-1.7-1.4-3.6-.7c-1.9.7-1.9 2.8-1.9 2.8s-.5-.5-1.7-.2c-1.2.2-1.4.7-1.4.7s-.7-2.3-2.8-2.8c-2.1-.5-4.3.2-4.3.2s-1.7-5-11.1-6c-3.8-.4-6.6.2-8.5 1v21.2h283.5V11.1c-.9.2-1.6.4-1.6.4s-5.2-8-16.1-8z"/>
                </svg>
            </div>
            <div class="container">
                <div class="events-group" id="upcoming-events-section" hidden>
                    <div class="section-title">
                        <h2 data-key="home.events_title">Предстоящи събития</h2>
                    </div>
                    <div class="events-carousel">
                        <button class="reviews-arrow reviews-arrow-left" type="button" data-events-scroll="prev" aria-label="Предишни събития">
                            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                <path d="M15 18l-6-6 6-6"></path>
                            </svg>
                        </button>
                        <div id="events-container" class="events-row">
                            <!-- Upcoming Events will be loaded here -->
                            <div class="loading" style="text-align: center;">Зареждане...</div>
                        </div>
                        <button class="reviews-arrow reviews-arrow-right" type="button" data-events-scroll="next" aria-label="Следващи събития">
                            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                <path d="M9 6l6 6-6 6"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="events-group" id="past-events-section" hidden>
                    <div class="section-title">
                        <h2 data-key="home.past_events_title">Минали събития</h2>
                    </div>
                    <div class="events-carousel">
                        <button class="reviews-arrow reviews-arrow-left" type="button" data-events-scroll="prev" aria-label="Предишни минали събития">
                            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                <path d="M15 18l-6-6 6-6"></path>
                            </svg>
                        </button>
                        <div id="past-events-container" class="events-row">
                            <!-- Past Events will be loaded here -->
                        </div>
                        <button class="reviews-arrow reviews-arrow-right" type="button" data-events-scroll="next" aria-label="Следващи минали събития">
                            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                <path d="M9 6l6 6-6 6"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div id="site-footer"></div>

    <script src="js/main.js"></script>
</body>
</html>
